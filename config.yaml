# lightning.pytorch==2.6.1
seed_everything: 0
torch_hub_dir: ~/.cache/torch/hub
huggingface_cache_dir: null
trainer:
  accelerator: auto
  strategy: ddp
  devices: auto
  num_nodes: 1
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      name: pretraining_pix256_selfflow
      save_dir: .
      version: null
      offline: false
      dir: null
      id: null
      anonymous: null
      project: universal_flow_JiT_t2i
      log_model: false
      experiment: null
      prefix: ''
      checkpoint_name: null
      add_file_policy: mutable
      entity: null
      notes: null
      tags: null
      config: null
      config_exclude_keys: null
      config_include_keys: null
      allow_val_change: null
      group: null
      job_type: null
      mode: null
      force: null
      reinit: null
      resume: null
      resume_from: null
      fork_from: null
      save_code: null
      tensorboard: null
      sync_tensorboard: null
      monitor_gym: null
      settings: null
  callbacks:
  - class_path: src.callbacks.model_checkpoint.CheckpointHook
    init_args:
      dirpath: null
      filename: null
      monitor: null
      verbose: false
      save_last: true
      save_top_k: -1
      save_on_exception: false
      save_weights_only: false
      mode: min
      auto_insert_metric_name: true
      every_n_train_steps: 20000
      train_time_interval: null
      every_n_epochs: null
      save_on_train_epoch_end: null
      enable_version_counter: true
  - class_path: src.callbacks.save_images.SaveImagesHook
    init_args:
      save_dir: val
      save_compressed: false
  fast_dev_run: false
  max_epochs: null
  min_epochs: null
  max_steps: 200000
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: 20000
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  log_every_n_steps: 50
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 3
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: false
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins:
  - class_path: src.plugins.bd_env.BDEnvironment
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: ./universal_pix_t2i_workdirs
  enable_autolog_hparams: true
  model_registry: null
model:
  vae:
    class_path: src.models.autoencoder.pixel.PixelAE
    init_args:
      scale: 1.0
      shift: 0.0
  conditioner:
    class_path: src.models.conditioner.qwen3_text_encoder.Qwen3TextEncoder
    init_args:
      weight_path: Qwen/Qwen3-1.7B
      embed_dim: 2048
      max_length: 128
  denoiser:
    class_path: src.models.transformer.JiT_T2I.JiT_T2I
    init_args:
      input_size: 256
      in_channels: 3
      num_groups: 24
      hidden_size: 1536
      num_blocks: 16
      num_text_blocks: 4
      patch_size: 16
      txt_embed_dim: 2048
      txt_max_length: 128
      bottleneck_dim: 256
      weight_path: null
      load_ema: false
  diffusion_trainer:
    class_path: src.diffusion.flow_matching.training_self_flow_JiT_LPIPS_DINO_HardGate.SelfFlowTrainer
    init_args:
      scheduler:
        class_path: src.diffusion.flow_matching.scheduling.LinearScheduler
      encoder:
        class_path: src.models.encoder.DINOv2
        init_args:
          weight_path: ~/.cache/torch/hub/checkpoints/dinov2_vitb14_pretrain.pth
          base_patch_size: 16
      loss_weight_fn: src.diffusion.flow_matching.training_self_flow_JiT_LPIPS_DINO_HardGate.constant
      lognorm_t: true
      timeshift: 1.0
      P_mean: -0.8
      P_std: 0.8
      t_eps: 0.05
      student_layer: 6
      teacher_layer: 12
      teacher_t_gap: 0.1
      min_student_t: 0.02
      mask_ratio: 0.25
      self_flow_weight: 0.5
      proj_dim_in: 1536
      proj_hidden_dim: 1536
      proj_dim_out: 1536
      dino_layers:
      - 11
      lpips_weight: 0.1
      dino_weight: 0.01
      percept_t_threshold: 0.3
      percept_ratio: 1.0
      null_condition_p: 0.1
  diffusion_sampler:
    class_path: src.diffusion.flow_matching.sampling.EulerSamplerJiT
    init_args:
      w_scheduler:
        class_path: src.diffusion.flow_matching.scheduling.LinearScheduler
      timeshift: 1.0
      guidance_interval_min: 0.0
      guidance_interval_max: 1.0
      step_fn: src.diffusion.flow_matching.sampling.ode_step_fn
      last_step: null
      last_step_fn: src.diffusion.flow_matching.sampling.ode_step_fn
      scheduler:
        class_path: src.diffusion.flow_matching.scheduling.LinearScheduler
      guidance_fn: src.diffusion.base.guidance.simple_guidance_fn
      num_steps: 100
      guidance: 4.0
  ema_tracker:
    class_path: src.callbacks.simple_ema.SimpleEMA
    init_args:
      decay: 0.9999
      every_n_steps: 1
  optimizer:
    class_path: torch.optim.AdamW
    init_args:
      lr: 0.0002
      betas:
      - 0.9
      - 0.95
      eps: 1.0e-08
      weight_decay: 0.0
      amsgrad: false
      maximize: false
      foreach: null
      capturable: false
      differentiable: false
      fused: null
  lr_scheduler: null
  eval_original_model: false
data:
  train_dataset:
    class_path: src.data.dataset.blip3o_dataset.WebDatasetPackedDataset
    init_args:
      urls:
      - /mnt/ephemeral/blip_dataset/BLIP3o-Pretrain-Long-Caption
      - /mnt/ephemeral/blip_dataset/BLIP3o-Pretrain-Short-Caption
      - /mnt/ephemeral/blip_dataset/BLIP3o-Pretrain-JourneyDB
      resolution: 256
      random_crop: false
      shuffle_buffer: 1000
      sample_shuffle: true
      repeat: true
  eval_dataset:
    class_path: src.data.dataset.geneval.GenEvalDataset
    init_args:
      meta_json_path: ./evaluations/geneval/evaluation_metadata.jsonl
      num_samples_per_instance: 4
      latent_shape:
      - 3
      - 256
      - 256
  pred_dataset:
    class_path: src.data.dataset.geneval.GenEvalDataset
    init_args:
      meta_json_path: ./evaluations/geneval/evaluation_metadata.jsonl
      num_samples_per_instance: 4
      latent_shape:
      - 3
      - 256
      - 256
  train_batch_size: 64
  train_num_workers: 4
  train_prefetch_factor: 2
  eval_batch_size: 32
  eval_num_workers: 4
  pred_batch_size: 8
  pred_num_workers: 1
tags:
  exp: pretraining_pix256_selfflow
ckpt_path: ./universal_pix_t2i_workdirs/exp_pretraining_pix256_selfflow/epoch=0-step=180000.ckpt
weights_only: null
